[package]
name = "example-rate-limiting"
version = "0.1.0"
edition = "2021"
publish = false

[dependencies]
axum = { path = "../../axum" }
tokio = { version = "1.0", features = ["full"] }
tower = { version = "0.5.2", features = ["limit", "buffer", "load-shed"] }
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
